<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - MKR Interactive</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
        }
        .login-box {
            background: rgba(11, 12, 16, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(102, 252, 241, 0.3);
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        
        .login-box img {
            height: 70px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(102, 252, 241, 0.5));
        }
        
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(31, 40, 51, 0.6);
            border: 1px solid var(--neon-blue);
            color: var(--text-light);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.3);
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .login-btn:hover {
            background: var(--neon-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        
        #error-msg {
            color: #ff0050;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
            text-shadow: 0 0 5px rgba(255, 0, 80, 0.5);
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="/images/logo.png" alt="MKR Logo">
        <h2 style="color: var(--text-light); margin-bottom: 30px; font-weight: 600;">System Access</h2>
        
        <div class="input-group">
            <input type="password" id="password" placeholder="Enter Security Key" onkeypress="if(event.key === 'Enter') login()">
        </div>
        
        <button class="login-btn" onclick="login()">Authenticate</button>
        <p id="error-msg">⚠️ Security Key Invalid!</p>
    </div>

    <script>
        async function login() {
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/mkr-admin/dashboard';
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('password').style.borderColor = '#ff0050';
                setTimeout(() => {
                    document.getElementById('error-msg').style.display = 'none';
                    document.getElementById('password').style.borderColor = 'var(--neon-blue)';
                }, 3000); // Pesan error hilang setelah 3 detik
            }
        }
    </script>
</body>
</html>
